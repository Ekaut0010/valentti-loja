<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=Tangerine&display=swap"
    rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@700&family=PT+Sans:wght@400;700&family=Tangerine&display=swap"
    rel="stylesheet">

  <title>Document</title>
</head>

<body>
  <section class="container">
    <header class="header">
      <div class="logo">
        <h1 class="title_shop">Valentti</h1>
        <h2 id="slogan">Elegância em cada detalhe</h2>
      </div>
      <nav class="nav_bar">

        <a href="#" class="nav__home">Início</a>
        <a href="#nav_products" class="nav__products">Produtos</a>
        <a href="#nav__about" class="nav__about">Sobre</a>
        <a href="#nav__contact" class="nav__contact">Contato</a>

      </nav>
      <div class="icons">
        <input type="text" class="search_input search_click" placeholder="Pesquisar..." />
        <a href="#" class="search search_click active"><img width="50" height="50"
            src="https://img.icons8.com/ios/50/search--v1.png" alt="search--v1" />
        </a>

        <a href="#" class="cart"><img width="50" height="50" src="https://img.icons8.com/ios/50/shopping-cart--v1.png"
            alt="Cart Icon" />
        </a>

      </div>
    </header>
  </section>
  <section class="banner">
    <div class="slider">
      <div class="slides">
        <img class="slide active" src="./img/banner-maquiagem-site.png" alt="Banner 1">
        <img class="slide" src="./img/Banner_NOIR_1920x700.jpeg" alt="Banner 2">
        <img class="slide" src="./img/4d8d08a4-5998-4899-9f36-2c0983261d97___0f69b95456f490d6181312ab2600f438.webp"
          alt="Banner 3">



      </div>
      <button class="prev">&#10094;</button>
      <button class="next">&#10095;</button>
      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </section>

  <section class="products" id="nav_products">
    <h1 class="title_products">Novos Produtos</h1>
    <div class="product_container">
      <div class="card_product">
        <img src="./img/batom_bala_lipcolor_3_5g_dalla_891_1_760992ef38527de08f970e51439d2ff9.webp" alt="Produto">
        <h3 class="product_name">Batom</h3>
        <p class="product_description">Descrição do produto 1</p>
        <p class="product_price">R$ 99,99</p>
        <button class="buy_button">Comprar</button>
        <button class="details_button">Detalhes</button>
      </div>
      <div class="card_product">
        <img src="./img/gloss_brilho_labial_sarah_s_beauty_2273_1_bebf64d1c40602cf1aa6feb133e73fe7.webp" alt="Produto">
        <h3 class="product_name">Gloss</h3>
        <p class="product_description">Descrição do produto 2</p>
        <p class="product_price">R$ 99,99</p>
        <button class="buy_button">Comprar</button>
        <button class="details_button">Detalhes</button>
      </div>
      <div class="card_product">
        <img src="./img/mari-maria-makeup-base-e-corretivo-matte-velvet-skin-25g-bege-escuro-04-1160x1465.webp"
          alt="Produto">
        <h3 class="product_name">Corretivo</h3>

        <p class="product_description">Descrição do produto 3</p>
        <p class="product_price">R$ 99,99</p>
        <div class="buttons">
          <button class="buy_button">Comprar</button>
          <button class="details_button">Detalhes</button>
        </div>
      </div>
    </div>
  </section>

</body>
<script src="./JS/slide.js"></script>
<script src="./JS/search.js"></script>

</html>
